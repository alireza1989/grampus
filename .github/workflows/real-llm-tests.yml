name: Real LLM Integration Tests

on:
  schedule:
    - cron: '0 3 * * *'   # nightly 3am UTC
  workflow_dispatch:
    inputs:
      provider:
        description: 'Which provider(s) to test'
        type: choice
        options: [all, anthropic, openai]
        default: all

jobs:
  real-llm:
    name: Real LLM Tests
    runs-on: ubuntu-latest
    env:
      RUN_REAL_LLM_TESTS: 'true'
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras --group dev

      - name: Run real LLM tests (all providers)
        if: ${{ github.event.inputs.provider == 'all' || github.event_name == 'schedule' }}
        run: uv run pytest tests/integration/real_llm/ -v --tb=short -x

      - name: Run real LLM tests (Anthropic only)
        if: ${{ github.event.inputs.provider == 'anthropic' }}
        run: uv run pytest tests/integration/real_llm/ -v --tb=short -x -k "anthropic"

      - name: Run real LLM tests (OpenAI only)
        if: ${{ github.event.inputs.provider == 'openai' }}
        run: uv run pytest tests/integration/real_llm/ -v --tb=short -x -k "openai"

      - name: Post cost summary
        if: always()
        run: uv run python scripts/report_test_costs.py
