name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Mypy
        run: uv run mypy src/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras --group dev

      - name: Run unit tests
        run: uv run pytest -m "not integration" -v --cov=src/grampus --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Start services
        run: docker compose up -d

      - name: Install dependencies
        run: uv sync --all-extras --group dev

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for postgres..."
          timeout 60 bash -c 'until docker compose exec -T postgres pg_isready -U postgres -d grampus; do sleep 2; done'
          echo "Waiting for redis..."
          timeout 30 bash -c 'until docker compose exec -T redis redis-cli ping | grep -q PONG; do sleep 2; done'
          echo "All services healthy"

      - name: Start Dapr sidecar
        run: |
          docker run -d \
            --name daprd \
            --network host \
            -v $(pwd)/dapr/components:/components:ro \
            daprio/daprd:1.17.5 \
            ./daprd \
              --app-id grampus-test \
              --resources-path /components \
              --dapr-http-port 3500 \
              --dapr-grpc-port 50001 \
              --placement-host-address localhost:50005 \
              --log-level info
          echo "Waiting for Dapr sidecar to be ready..."
          timeout 60 bash -c 'until curl -sf http://localhost:3500/v1.0/healthz/outbound > /dev/null 2>&1; do sleep 2; done'
          echo "Dapr sidecar is ready"

      - name: Run integration tests
        run: uv run pytest -m integration -v || [ $? -eq 5 ]

      - name: Tear down services
        if: always()
        run: |
          docker logs daprd 2>/dev/null || true
          docker compose down -v

  docs:
    name: Docs Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Build docs
        run: uv run mkdocs build --strict
