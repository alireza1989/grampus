name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Mypy
        run: uv run mypy src/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras --group dev

      - name: Run unit tests
        run: uv run pytest -m "not integration" -v --cov=src/nexus --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Start services
        run: docker compose up -d

      - name: Install dependencies
        run: uv sync --all-extras --group dev

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for postgres..."
          timeout 60 bash -c 'until docker compose exec -T postgres pg_isready -U postgres -d nexus; do sleep 2; done'
          echo "Waiting for redis..."
          timeout 30 bash -c 'until docker compose exec -T redis redis-cli ping | grep -q PONG; do sleep 2; done'
          echo "All services healthy"

      - name: Install Dapr CLI
        run: |
          wget -q https://raw.githubusercontent.com/dapr/cli/master/install/install.sh -O - | /bin/bash
          dapr --version

      - name: Initialize Dapr runtime (slim — no extra Docker containers)
        run: dapr init --slim --runtime-version 1.17.5

      - name: Start Dapr sidecar
        run: |
          nohup ~/.dapr/bin/daprd \
            --app-id nexus-test \
            --resources-path ./dapr/components \
            --config ./dapr/config.yaml \
            --dapr-http-port 3500 \
            --dapr-grpc-port 50001 \
            --placement-host-address localhost:50005 \
            --log-level warn \
            > /tmp/daprd.log 2>&1 &
          echo "Waiting for Dapr sidecar to be ready..."
          timeout 60 bash -c 'until curl -sf http://localhost:3500/v1.0/healthz/outbound > /dev/null; do sleep 2; done'
          echo "Dapr sidecar is ready"

      - name: Run integration tests
        run: uv run pytest -m integration -v || [ $? -eq 5 ]

      - name: Tear down services
        if: always()
        run: docker compose down -v
