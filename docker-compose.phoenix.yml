# Start Phoenix alongside existing services:
#   docker compose -f docker-compose.yml -f docker-compose.phoenix.yml up -d
services:
  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"   # Phoenix UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    environment:
      - PHOENIX_WORKING_DIR=/phoenix
    volumes:
      - phoenix_data:/phoenix
    networks:
      - nexus-net

volumes:
  phoenix_data:

networks:
  nexus-net:
    external: true    # attaches to the network created by docker-compose.yml