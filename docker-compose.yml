services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: grampus
      POSTGRES_DB: grampus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d grampus"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - grampus-net

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - grampus-net

  dapr-placement:
    image: daprio/placement:1.17.5
    command: ["./placement", "-port", "50005", "-log-level", "warn"]
    ports:
      - "50005:50005"
    networks:
      - grampus-net

volumes:
  postgres_data:

networks:
  grampus-net:
    driver: bridge
