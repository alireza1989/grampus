apiVersion: 1

providers:
  - name: grampus-dashboards
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards/grampus
      foldersFromFilesStructure: false
    folder: Grampus
    folderUid: grampus-folder
