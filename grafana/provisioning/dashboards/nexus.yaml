apiVersion: 1

providers:
  - name: nexus-dashboards
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards/nexus
      foldersFromFilesStructure: false
    folder: Nexus
    folderUid: nexus-folder
