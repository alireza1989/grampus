# One-command local observability stack for Nexus.
# Usage: docker compose -f grafana/docker-compose.grafana.yml up -d
#
# Note: pinned to grafana/grafana:11.6.0 — the last stable release before
# Grafana 12/13 introduced experimental V2 provisioning. Upgrade to
# grafana/grafana:latest if you want Grafana 13, but you may need to
# re-export the dashboard via the Grafana UI first.

version: "3.9"

services:
  prometheus:
    image: prom/prometheus:v3.4.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d

  grafana:
    image: grafana/grafana:11.6.0
    depends_on: [prometheus]
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=nexus
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./provisioning:/etc/grafana/provisioning:ro
      - ./dashboards:/var/lib/grafana/dashboards/nexus:ro
