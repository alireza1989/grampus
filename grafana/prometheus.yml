global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: grampus
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8000   # adjust if Grampus runs elsewhere
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
