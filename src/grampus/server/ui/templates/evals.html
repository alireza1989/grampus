{% extends "base.html" %}

{% block title %}Evals{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Eval Suite History</h1>
</div>

<div class="filter-bar">
  <select
    id="suite-filter"
    name="suite_name"
    hx-get="/ui/evals/_runs"
    hx-trigger="change"
    hx-target="#evals-runs"
    hx-swap="innerHTML"
    class="filter-input"
  >
    <option value="">All Suites</option>
    {% for name in suite_names %}
    <option value="{{ name }}">{{ name }}</option>
    {% endfor %}
  </select>

  <button
    class="btn btn-secondary"
    hx-get="/ui/evals/_trend"
    hx-include="#suite-filter"
    hx-target="#evals-detail"
    onclick="document.getElementById('evals-detail').classList.remove('hidden')"
  >Trend</button>
</div>

<div id="evals-runs"
     hx-get="/ui/evals/_runs"
     hx-trigger="load"
     hx-swap="innerHTML">
  Loading…
</div>

<aside id="evals-detail" class="detail-panel hidden"></aside>
{% endblock %}
