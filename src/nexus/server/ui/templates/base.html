<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Nexus{% endblock %} — Nexus</title>
  <link rel="stylesheet" href="/ui/static/style.css">
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js" defer></script>
</head>
<body>
<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-brand">⬡ Nexus</div>
    <ul class="nav-links">
      <li><a href="/ui/" class="{{ 'active' if active_page == 'dashboard' }}">
        <span class="nav-icon">◈</span> Dashboard
      </a></li>
      <li><a href="/ui/memory/" class="{{ 'active' if active_page == 'memory' }}">
        <span class="nav-icon">◉</span> Memory
      </a></li>
      <li class="nav-soon"><span class="nav-icon">◎</span> Evals <span class="badge">soon</span></li>
      <li class="nav-soon"><span class="nav-icon">◷</span> Cost <span class="badge">soon</span></li>
      <li><a href="/alerts/rules" class="{{ 'active' if active_page == 'alerts' }}">
        <span class="nav-icon">◌</span> Alerts
      </a></li>
    </ul>
    <div class="sidebar-footer">
      <a href="/docs" target="_blank">API Docs</a>
      <a href="/health">Health</a>
    </div>
  </nav>
  <main class="content">
    {% block content %}{% endblock %}
  </main>
</div>
</body>
</html>
