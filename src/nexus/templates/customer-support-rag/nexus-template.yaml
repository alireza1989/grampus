name: customer-support-rag
version: "1.0.0"
description: "Customer support agent with RAG knowledge base"
long_description: |
  A customer support agent that uses Retrieval-Augmented Generation (RAG)
  to answer questions from a local knowledge base. Includes episodic memory
  for conversation continuity and a strict safety pipeline to prevent
  inappropriate responses.
tags: [rag, support, memory, safety]
category: support
author: nexus-team
min_nexus_version: "0.1.0"
required_tools: [file_read, sql_query]
required_models: [balanced]
entry_point: agent.py
parameters:
  - name: project_name
    description: "Python-safe project name (lowercase, underscores)"
    default: support_agent
  - name: model
    description: "Model to use (e.g. claude-sonnet-4-6, gpt-4o)"
    default: claude-sonnet-4-6
  - name: knowledge_base_path
    description: "Path to knowledge base directory (markdown or text files)"
    default: ./knowledge_base
files:
  - agent.py
  - config.yaml
  - README.md
