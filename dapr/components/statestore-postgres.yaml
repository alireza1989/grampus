apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore
spec:
  type: state.postgresql
  version: v1
  metadata:
    - name: connectionString
      value: "host=localhost user=postgres password=nexus port=5432 connect_timeout=10 database=nexus sslmode=disable"
    - name: schema
      value: "public"
    - name: cleanupInterval
      value: "300"
